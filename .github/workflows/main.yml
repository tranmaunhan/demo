name: CI/CD Java App

on:
  push:
    branches: [ "main","master" ] # Chạy khi push vào branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}     # IP của máy ảo hoặc domain ssh
          username: ${{ secrets.SERVER_USER }} # tranmaunhan
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # Private key để login
          script: |
            # Dừng container cũ nếu đang chạy
            docker stop my-java-app || true
            docker rm my-java-app || true
            # Build image mới từ code vừa push (có thể dùng Docker Hub nếu muốn xịn hơn)
            cd /path/to/your/project
            docker build -t my-java-app .
            docker run -d --name my-java-app -p 8080:8080 my-java-app
