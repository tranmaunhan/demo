name: CI/CD Java App to VPS (Public IP)

on:
  push:
    branches:
      - master


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4  # Nâng cấp v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: ./mvnw clean verify -B
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

#      - name: Set up JDK 21
#        uses: actions/setup-java@v3
#        with:
#          java-version: '21'
#          distribution: 'temurin'
#          cache: maven
#
#      - name: Build with Maven
#        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/demo-java-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}     
          username: root                       
          key: ${{ secrets.SSH_PRIVATE_KEY }}  
          port: 22
          script: |
            # 1. Đăng nhập Docker trên VPS (để kéo image nếu là repo private)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 2. Kéo Image mới nhất
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/demo-java-app:latest
            
            # 3. Dừng và xóa Container cũ
            docker stop my-app-container || true
            docker rm my-app-container || true
            
            # 4. Chạy Container mới
            # Thêm --restart unless-stopped để app tự khởi động lại khi server crash
            docker run -d \
              --name my-app-container \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/demo-java-app:latest
            
            # 5. Dọn dẹp hệ thống
            docker image prune -f
