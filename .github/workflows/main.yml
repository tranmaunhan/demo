name: CI/CD Java App to VPS

on:
  push:
    branches:
      - master  # Chạy khi bạn push code vào nhánh masterr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Lấy code từ GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Cấu hình Java 21 (Sửa lỗi 'release version 21 not supported')
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Build file JAR bằng Maven (Bỏ qua chạy unit test để build nhanh)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build Docker Image và đẩy lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Thay 'demo-java-app' bằng tên repo Docker của bạn nếu cần
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/demo-java-app:latest

  deploy:
    needs: build-and-push # Chỉ chạy khi bước Build ở trên thành công
    runs-on: ubuntu-latest
    steps:
      # 6. SSH vào VPS và thực hiện lệnh deploy
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}     # ssh.aihost.io.vn
          username: tranmaunhan               # User trên Ubuntu của bạn
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Nội dung file id_rsa
          port: 22
          script: |
            # 1. Kéo Image mới nhất từ Docker Hub về VPS
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/demo-java-app:latest
            
            # 2. Dừng và xóa Container cũ (nếu đang chạy) để tránh xung đột port
            docker stop my-app-container || true
            docker rm my-app-container || true
            
            # 3. Chạy Container mới trên port 8080
            docker run -d \
              --name my-app-container \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/demo-java-app:latest
            
            # 4. Dọn dẹp các Image cũ không dùng đến để tiết kiệm dung lượng VPS
            docker image prune -f
